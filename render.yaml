services:
  - type: web
    name: resume-analyzer-backend
    runtime: java
    rootDir: resume-analyzer-backend
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/resume-analyzer-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: "21"
